services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  bridge:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    command: uvicorn backend.bridge:app --host 0.0.0.0 --port 8000
    depends_on:
      - kafka

  frontend-react:
    image: node:20-slim
    working_dir: /app/frontend
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    # Lệnh cài đặt và chạy dev server
    command: >
      sh -c "npm install && npm run dev -- --port 3001 --host"
    depends_on:
      - bridge

  data-simulator:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    command: python /app/backend/simulator.py
    depends_on:
      - kafka