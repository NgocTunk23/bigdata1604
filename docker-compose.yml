services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      # KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  spark-engine:
    build: .
    volumes:
      - .:/app
    # Spark sẽ gọi Kafka qua tên service 'kafka'
    command: spark-submit --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 /app/backend/spark_engine.py
    depends_on:
      - kafka

  streamlit-web:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run /app/backend/app.py
    depends_on:
      - kafka

  data-simulator:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    # Lệnh chạy file simulator
    command: python /app/backend/simulator.py
    # Bắt buộc phải đợi Kafka sẵn sàng mới được bắn dữ liệu
    depends_on:
      - kafka
