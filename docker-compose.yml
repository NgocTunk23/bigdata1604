services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092" 
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 1. Server bắn dữ liệu từ Parquet vào luồng Kafka
  merged-producer:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    command: python merged_producer.py
    ports:
      - "8003:8003" 
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data/results:/app/data/results
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_NAME: customer_clusters
      DATA_SOURCE: /app/data/results/clustered_users.jsonl

  # 2. [MỚI THÊM] Tiến trình Spark đọc luồng, Join tĩnh, và đẩy kết quả ra Kafka
  spark-streaming:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python spark_streaming.py
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data/results:/app/data/results
    environment:
      KAFKA_BROKER: kafka:9092

  # 3. Server WebSocket đọc kết quả từ Spark và đẩy ra React
  streaming-server:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python ws_server.py
    ports:
      - "8001:8000"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_NAME: customer_clusters
    
  # 4. Giao diện người dùng
  frontend-react:
    image: node:20-slim
    working_dir: /app/frontend
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    command: >
      sh -c "npm install && npm run dev -- --port 3001 --host"